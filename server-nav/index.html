<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08111f" />
    <title>YSSX 服务器导航</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <span class="halo halo-a"></span>
      <span class="halo halo-b"></span>
      <span class="grid"></span>
    </div>

    <main class="shell">
      <nav class="topbar" aria-label="站点导航">
        <a class="brand" href="./">
          <span class="brand-mark">Y</span>
          <span>YSSX Hub</span>
        </a>
        <a class="topbar-link" href="./games/">小游戏中心</a>
      </nav>

      <header class="hero">
        <section class="hero-copy">
          <p class="kicker">yssx.abrdns.com</p>
          <h1>服务器导航</h1>
          <p class="subtitle">一个入口管理你的博客、云盘、阅读器、酒馆项目和本地小游戏中心。卡片只保留一个主跳转，移动端也能快速点开。</p>
          <div class="hero-actions">
            <a class="primary-action" href="#services">打开服务面板</a>
            <a class="secondary-action" href="./games/">玩小游戏</a>
          </div>
        </section>

        <section class="hero-panel" aria-label="控制台概览">
          <img src="./assets/console-hero.svg" alt="服务器控制台插画" />
          <div class="panel-stats">
            <span><strong>5</strong> 个入口</span>
            <span><strong>6</strong> 个小游戏</span>
            <span class="online"><i></i>Online</span>
          </div>
        </section>
      </header>

      <section id="services" class="services" aria-label="服务器服务">
        <a class="service-card" href="http://yssx.abrdns.com:1234/">
          <img src="./assets/icon-blog.svg" alt="" />
          <span class="service-body">
            <b>博客</b>
            <small>文章、记录和个人主页</small>
          </span>
          <span class="port">1234</span>
        </a>

        <a class="service-card" href="http://yssx.abrdns.com:5244/">
          <img src="./assets/icon-cloud.svg" alt="" />
          <span class="service-body">
            <b>云盘</b>
            <small>文件管理、下载和移动端访问</small>
          </span>
          <span class="port">5244</span>
        </a>

        <a class="service-card" href="http://yssx.abrdns.com:5000/">
          <img src="./assets/icon-reader.svg" alt="" />
          <span class="service-body">
            <b>阅读器</b>
            <small>RSS 信息流和订阅阅读</small>
          </span>
          <span class="port">5000</span>
        </a>

        <a class="service-card" href="http://yssx.abrdns.com:8100/">
          <img src="./assets/icon-tavern.svg" alt="" />
          <span class="service-body">
            <b>酒馆项目</b>
            <small>角色、聊天和创作工作区</small>
          </span>
          <span class="port">8100</span>
        </a>

        <a class="service-card game-card" href="./games/">
          <img src="./assets/icon-games.svg" alt="" />
          <span class="service-body">
            <b>小游戏中心</b>
            <small>贪吃蛇、俄罗斯方块、扫雷、2048 等</small>
          </span>
          <span class="port">本地</span>
        </a>
      </section>
    </main>
  </body>
</html>
